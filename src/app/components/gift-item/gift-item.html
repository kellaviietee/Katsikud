<div class="gift-card" [class.ticked]="ticked()">
  <button
    class="tick-btn"
    [class.ticked]="ticked()"
    (click)="toggle()"
    [attr.aria-label]="ticked() ? 'Unmark gift' : 'Mark as being bought'"
    [attr.aria-pressed]="ticked()"
  >
    @if (ticked()) {
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="4"/>
      </svg>
    }
  </button>

  <div class="gift-info">
    <span class="gift-name" [class.strikethrough]="ticked()">{{ gift().name }}</span>
    @if (gift().url) {
      <a
        class="gift-link"
        [href]="gift().url"
        target="_blank"
        rel="noopener noreferrer"
        title="View example item"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Example
      </a>
    }
  </div>

  @if (editMode()) {
    <button class="remove-btn" (click)="onRemove()" aria-label="Remove gift">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  }
</div>
